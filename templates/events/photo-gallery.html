{% extends 'layouts/base.html' %}

{% block title %} All Photo Gallery {% endblock title %}

{% block content %}

{% include 'inc/alert.html' %}



<div class="dashboard-main-body">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-24">
<h6 class="fw-semibold mb-0">Gallery Grid</h6>
<ul class="d-flex align-items-center gap-2">
<li class="fw-medium">
  <a href="index.html" class="d-flex align-items-center gap-1 hover-text-primary">
    <iconify-icon icon="solar:home-smile-angle-outline" class="icon text-lg"></iconify-icon>
    Dashboard
  </a>
</li>
<li>-</li>
<li class="fw-medium">Gallery Grid</li>
</ul>
</div>

    <div class="card h-100 p-0 radius-12 overflow-hidden gallery-scale">
        <div class="card-body p-24">
            <div class="row gy-4">
              
                {% for img in event.photos.all %}
                <div class="col-xxl-3 col-md-4 col-sm-6">
                    <div class="hover-scale-img border radius-16 overflow-hidden p-8">
                        <a href="{{img.photo.url}}" class="popup-img w-100 h-100 d-flex radius-12 overflow-hidden">
                            <img src="{{img.photo.url}}" alt="" class="hover-scale-img__img w-100 h-100 object-fit-cover" style="height: 200px !important; width: 400px !important;">
                        </a>
                    </div>
                </div>
                {% endfor %}
           
             
            </div>
        </div>
    </div>
</div>
{% load static %}
<!-- jQuery library js -->
<script src="{% static 'assets/js/lib/jquery-3.7.1.min.js' %}"></script>
<!-- Bootstrap js -->
<script src="{% static 'assets/js/lib/bootstrap.bundle.min.js' %}"></script>
<!-- Apex Chart js -->
<script src="{% static 'assets/js/lib/apexcharts.min.js' %}"></script>
<!-- Data Table js -->
<script src="{% static 'assets/js/lib/dataTables.min.js' %}"></script>
<!-- Iconify Font js -->
<script src="{% static 'assets/js/lib/iconify-icon.min.js' %}"></script>
<!-- jQuery UI js -->
<script src="{% static 'assets/js/lib/jquery-ui.min.js' %}"></script>
<!-- Vector Map js -->
<script src="{% static 'assets/js/lib/jquery-jvectormap-2.0.5.min.js' %}"></script>
<script src="{% static 'assets/js/lib/jquery-jvectormap-world-mill-en.js' %}"></script>
<!-- Popup js -->
<script src="{% static 'assets/js/lib/magnifc-popup.min.js' %}"></script>
<!-- Slick Slider js -->
<script src="{% static 'assets/js/lib/slick.min.js' %}"></script>
<!-- Prism js -->
<script src="{% static 'assets/js/lib/prism.js' %}"></script>
<!-- File Upload js -->
<script src="{% static 'assets/js/lib/file-upload.js' %}"></script>
<!-- Audio Player js -->
<script src="{% static 'assets/js/lib/audioplayer.js' %}"></script>

<!-- main js -->
<script src="/static/assets/js/app.js"></script>
<script>
    console.log("hello")
    $('.popup-img').magnificPopup({
        type: 'image',
        gallery: {
            enabled: true
        },
    })
    console.log("world")

</script>

{% endblock content %}
